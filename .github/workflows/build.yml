name: Build APK (KivyMD)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      ANDROIDAPI: "33"
      ANDROIDNDK: "25b"

    steps:
    # 1. Checkout code
    - name: Checkout source
      uses: actions/checkout@v4

    # 2. Cache buildozer (BIG speed boost)
    - name: Cache buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-

    # 3. Install system dependencies
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev

    # 4. Install Buildozer
    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython

    # 5. Build APK
    - name: Build APK
      run: |
        buildozer android debug

    # 6. Upload APK (FIXED VERSION)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kivy-apk
        path: bin/*.apk
