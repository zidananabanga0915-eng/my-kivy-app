name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # ← This lets you trigger it manually from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build APK with Buildozer
        id: buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          workdir: .
          # command defaults to "buildozer android debug" — you can override if needed

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-kivy-app-apk
          path: ${{ steps.buildozer.outputs.filename }}
