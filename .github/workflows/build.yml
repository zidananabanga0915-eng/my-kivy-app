name: Build APK (KivyMD)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout source
        uses: actions/checkout@v4

      # ✅ FIX 1: Force Python 3.10 (CRITICAL)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Java (required for Android SDK)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # System dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            git zip unzip \
            libffi-dev \
            libssl-dev \
            zlib1g-dev \
            libncurses5 \
            libstdc++6

      # Install Buildozer + pinned tools
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer

      # ✅ FIX 2: Auto accept licenses + build
      - name: Build APK
        run: |
          yes | buildozer -v android debug

      # Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
